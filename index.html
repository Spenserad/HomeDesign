<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Floor Plan Generator</title>
  <style>
    :root {
      color-scheme: light;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f6f7fb;
      color: #1f2937;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid #d1d5db;
      background: #fff;
      padding: 18px;
    }

    .sidebar h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    .panel {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      background: #fafafa;
    }

    .panel h3 {
      margin: 0 0 8px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #4b5563;
    }

    #level-select {
      width: 100%;
      padding: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #fff;
    }

    #layer-controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    .layer-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      font-size: 13px;
    }

    .summary-grid strong {
      display: block;
      font-size: 18px;
      margin-top: 2px;
      color: #111827;
    }

    .main-content {
      padding: 18px;
    }

    #canvas {
      width: 100%;
      height: 70vh;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: #fff;
    }

    th,
    td {
      text-align: left;
      padding: 6px;
      border-bottom: 1px solid #e5e7eb;
    }

    th {
      background: #f3f4f6;
      font-size: 12px;
      text-transform: uppercase;
      color: #4b5563;
      letter-spacing: 0.04em;
    }

    .muted {
      color: #6b7280;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <h2>House Layout Designer</h2>

    <section class="panel">
      <h3>Level</h3>
      <select id="level-select" aria-label="Select floor level"></select>
    </section>

    <section class="panel">
      <h3>Layers</h3>
      <div id="layer-controls"></div>
    </section>

    <section class="panel">
      <h3>Plan Summary</h3>
      <div class="summary-grid">
        <div>Rooms<strong id="summary-room-count">0</strong></div>
        <div>Total Area<strong id="summary-total-area">0 sf</strong></div>
      </div>
      <p class="muted">Derived from canonical room catalog + level geometry.</p>
    </section>
  </aside>

  <main class="main-content">
    <div id="canvas"></div>

    <section class="panel" style="margin-top: 14px;">
      <h3>Room Schedule</h3>
      <table>
        <thead>
        <tr>
          <th>Room ID</th>
          <th>Name</th>
          <th>Type</th>
          <th>Area (sf)</th>
        </tr>
        </thead>
        <tbody id="room-schedule-body"></tbody>
      </table>
    </section>
  </main>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
