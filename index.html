<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Floor Plan Generator</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .controls {
      margin-bottom: 12px;
    }

    #level-selector {
      margin-left: 8px;
      padding: 4px 8px;
    }

    #canvas {
      width: 900px;
      height: 600px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

<h2>Floor Plan</h2>

<div class="controls">
  <label for="level-selector">Level:</label>
  <select id="level-selector" aria-label="Select floor level"></select>
</div>

<div id="canvas"></div>

<script type="module" src="./main.js"></script>

</body>
</html>
