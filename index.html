<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./src/styles/schedule.css">
  <link rel="stylesheet" href="./node_modules/frappe-gantt/dist/frappe-gantt.css">
  <title>Home Build Dashboard</title>
  <style>
    :root {
      color-scheme: light;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f6f7fb;
      color: #1f2937;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid #d1d5db;
      background: #fff;
      padding: 18px;
    }

    .sidebar h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    .panel {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      background: #fafafa;
    }

    .panel h3 {
      margin: 0 0 8px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #4b5563;
    }

    #level-select {
      width: 100%;
      padding: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #fff;
    }

    #layer-controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    .layer-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      font-size: 13px;
    }

    .summary-grid strong {
      display: block;
      font-size: 18px;
      margin-top: 2px;
      color: #111827;
    }

    .main-content {
      padding: 18px;
    }

    #canvas {
      width: 100%;
      height: 70vh;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: #fff;
    }

    th,
    td {
      text-align: left;
      padding: 6px;
      border-bottom: 1px solid #e5e7eb;
    }

    th {
      background: #f3f4f6;
      font-size: 12px;
      text-transform: uppercase;
      color: #4b5563;
      letter-spacing: 0.04em;
    }

    .muted {
      color: #6b7280;
      font-size: 12px;
      margin-top: 10px;
    }

        .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .page-header h1 {
      margin: 0;
      font-size: 24px;
    }

    .page-header p {
      margin: 4px 0 0;
      color: #6b7280;
      font-size: 14px;
    }

    .view-switcher {
      display: inline-flex;
      gap: 8px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 6px;
    }

    .view-switcher button {
      border: 0;
      background: transparent;
      color: #374151;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .view-switcher button.active {
      background: #111827;
      color: #fff;
    }

    .view-panel {
      display: none;
    }

    .view-panel.active {
      display: block;
    }

    .schedule-shell {
      display: grid;
      gap: 14px;
    }
  </style>
</head>
<script src="./node_modules/frappe-gantt/dist/frappe-gantt.umd.js"></script>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <h2>House Layout Designer</h2>

    <section class="panel">
      <h3>Level</h3>
      <select id="level-select" aria-label="Select floor level"></select>
    </section>

    <section class="panel">
      <h3>Layers</h3>
      <div id="layer-controls"></div>
    </section>

    <section class="panel">
      <h3>Plan Summary</h3>
      <div class="summary-grid">
        <div>Rooms<strong id="summary-room-count">0</strong></div>
        <div>Total Area<strong id="summary-total-area">0 sf</strong></div>
      </div>
      <p class="muted">Derived from canonical room catalog + level geometry.</p>
    </section>
  </aside>

      <main class="main-content">
    <div class="page-header">
      <div>
        <h1>Home Build Dashboard</h1>
        <p>Design the floor plan and track the construction schedule in one place.</p>
      </div>

      <div class="view-switcher" role="tablist" aria-label="Main views">
        <button id="tab-floorplan" class="active" type="button" data-view="floorplan">Floor Plan</button>
        <button id="tab-schedule" type="button" data-view="schedule">Schedule</button>
      </div>
    </div>

    <section id="view-floorplan" class="view-panel active">
      <div id="canvas"></div>

      <section class="panel" style="margin-top: 14px;">
        <h3>Room Schedule</h3>
        <table>
          <thead>
          <tr>
            <th>Room ID</th>
            <th>Name</th>
            <th>Type</th>
            <th>Area (sf)</th>
          </tr>
          </thead>
          <tbody id="room-schedule-body"></tbody>
        </table>
      </section>
    </section>

    <section id="view-schedule" class="view-panel">
      <div id="schedule-root" class="schedule-shell"></div>
    </section>
  </main>
</div>

<script type="module" src="./main.js"></script>
<script type="module">
  const buttons = [...document.querySelectorAll(".view-switcher button")];
  const panels = {
    floorplan: document.getElementById("view-floorplan"),
    schedule: document.getElementById("view-schedule")
  };

  buttons.forEach((button) => {
    button.addEventListener("click", () => {
      const view = button.dataset.view;

      buttons.forEach((b) => b.classList.toggle("active", b === button));
      Object.entries(panels).forEach(([key, panel]) => {
        panel.classList.toggle("active", key === view);
      });
    });
  });
</script>
</body>
</html>
